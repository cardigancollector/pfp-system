<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Attack — PfP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #04080a;
    --deep: #060d10;
    --gold: #c9a84c;
    --gold-bright: #f0d070;
    --gold-dim: #5a4a20;
    --green: #2ecc71;
    --green-dim: #0d3318;
    --red: #e74c3c;
    --blue: #3498db;
    --cyan: #00ffe0;
    --text: #d4ecd8;
    --text-dim: #4a6a50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    position: relative;
    padding: 30px 20px 40px;
  }

  /* Starfield */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* HUD */
  /* Game title */
  #title-bar {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  margin-bottom: 4px;
}

#title-bar .back-btn {
  justify-self: start;
}

#game-title {
  /* already centered by grid middle column */
}

  .back-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    display: inline-block;
    margin-right: 24px;
  }
  .back-btn:hover { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.3); }

  #game-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(201,168,76,0.45);
    margin-bottom: 6px;
    position: relative;
    z-index: 10;
  }

  .wave-badge {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-transform: uppercase;
    position: relative;
    z-index: 10;
    margin-bottom: 10px;
  }

  /* Game area row: left box | canvas | right box */
  #game-row {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .hud-box {
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(4,8,10,0.7);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 150px;
    align-self: center;
  }

  .hud-box-right {
    align-items: flex-end;
  }

  .hud-label { font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .hud-val { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.05em; }
  .hud-val.green { color: var(--green); }

  .lives-row { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
  .life-pip {
    width: 18px; height: 18px;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    background: var(--gold);
    box-shadow: 0 0 8px rgba(201,168,76,0.5);
    transition: all 0.3s;
  }
  .life-pip.dead { background: var(--gold-dim); box-shadow: none; }

  /* Canvas wrapper */
  #canvas-wrap {
    position: relative;
    z-index: 10;
    border: 1px solid rgba(201,168,76,0.15);
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.4);
    background: rgba(4,8,10,0.97);
  }

  canvas { display: block; }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(4,8,10,0.92);
    z-index: 20;
    gap: 20px;
  }

  .overlay-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 40px rgba(201,168,76,0.5);
    text-align: center;
  }

  .overlay-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    line-height: 2;
  }

  .overlay-score {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    color: var(--green);
    letter-spacing: 0.1em;
  }

  #sound-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 200;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    background: rgba(4,8,10,0.85);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #sound-btn:hover { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.3); }

  .start-btn {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
  }

  .start-btn:hover {
    background: rgba(201,168,76,0.1);
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
  }

  /* Drop label flash */
  #drop-flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--cyan);
    letter-spacing: 0.15em;
    pointer-events: none;
    opacity: 0;
    z-index: 30;
    text-shadow: 0 0 20px var(--cyan);
    white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="title-bar">
  <a class="back-btn" id="back-btn" href="../index.html">← Dashboard</a>
  <div id="game-title">CARD ATTACK</div>
</div>
<div class="wave-badge" id="hud-wave">Wave 1</div>

<div id="game-row">
  <div class="hud-box">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="hud-score">0</div>
    <div id="multiplier-display" class="hud-label" style="color:var(--cyan);margin-top:4px">×1 multiplier</div>
    <div style="margin-top:8px">
      <div class="hud-label">XP Earned</div>
      <div class="hud-val green" id="hud-xp">0</div>
    </div>
    <div style="margin-top:8px">
      <div class="hud-label">Daily XP Left</div>
      <div class="hud-val" id="hud-daily-remaining">—</div>
    </div>
  </div>

  <div id="canvas-wrap">
  <canvas id="game" width="800" height="560"></canvas>

  <div class="overlay" id="overlay-start">
    <div class="overlay-sub">
      ← → Move &nbsp;|&nbsp; Space Fire &nbsp;|&nbsp; 5 Lives<br>
      Destroy the invaders before they reach you
    </div>
    <button class="start-btn" id="btn-start">LAUNCH ATTACK</button>
  </div>

  <div class="overlay" id="overlay-dead" style="display:none">
    <div class="overlay-title">DESTROYED</div>
    <div class="overlay-sub">Final Score</div>
    <div class="overlay-score" id="final-score">0</div>
    <div class="overlay-sub" id="final-wave">Reached Wave 1</div>
    <button class="start-btn" id="btn-restart">ATTACK AGAIN</button>
  </div>

  <div id="drop-flash"></div>
</div>

  <div class="hud-box hud-box-right">
    <div class="hud-label">Lives</div>
    <div class="lives-row" id="lives-row">
      <div class="life-pip"></div>
      <div class="life-pip"></div>
      <div class="life-pip"></div>
      <div class="life-pip"></div>
      <div class="life-pip"></div>
    </div>
  </div>
</div>

<button id="sound-btn">🔊 SOUND ON</button>

<script>
// ── AUDIO ENGINE ──────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let soundEnabled = false;

function unlockAudio() {
  if (AC.state === 'suspended') AC.resume();
  soundEnabled = true;
  const btn = document.getElementById('sound-btn');
  if (btn) btn.textContent = '🔊 SOUND ON';
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  if (soundEnabled) {
    if (AC.state === 'suspended') AC.resume();
    btn.textContent = '🔊 SOUND ON';
  } else {
    btn.textContent = '🔇 SOUND OFF';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sound-btn').addEventListener('click', toggleSound);

  const backBtn = document.getElementById('back-btn');
  if (backBtn && cardId) {
    backBtn.href = '../index.html?card_id=' + encodeURIComponent(cardId) + (ownerToken ? '&owner_token=' + encodeURIComponent(ownerToken) : '');
  }

  loadGamingXP();
});

function beep(freq, dur, type='square', vol=0.15, decay=true) {
  if (!soundEnabled) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(vol, AC.currentTime);
  if (decay) g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}

function soundShoot()   { beep(880, 0.08, 'square', 0.12); }
function soundHit()     { beep(220, 0.12, 'sawtooth', 0.18); beep(160, 0.18, 'sawtooth', 0.12); }
function soundExplode() { beep(80, 0.3, 'sawtooth', 0.25); beep(55, 0.4, 'sawtooth', 0.2); }
function soundDeath()   { [400,300,200,100].forEach((f,i) => setTimeout(() => beep(f, 0.2, 'sawtooth', 0.2), i*80)); }
function soundPowerup() { [440,550,660,880].forEach((f,i) => setTimeout(() => beep(f, 0.1, 'sine', 0.15), i*60)); }
function soundShield()  { beep(330, 0.15, 'sine', 0.15); beep(440, 0.15, 'sine', 0.12); }
function soundWave()    { [200,300,400,600].forEach((f,i) => setTimeout(() => beep(f, 0.15, 'square', 0.1), i*70)); }

// ── CANVAS SETUP ──────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;

// ── API ───────────────────────────────────────────────────────
const API = 'https://script.google.com/macros/s/AKfycbwtgR6eiGfCtBSij8OhbxNyaQ5CPI0KpbuAZ9Rmw2SXHj-0EmRU20PVGpq5SRPX3OMy/exec';

// ── IDENTITY FLOW ─────────────────────────────────────────────
const urlParams  = new URLSearchParams(window.location.search);
const cardId     = urlParams.get('card_id')     || localStorage.getItem('pfp_gaming_card')  || null;
const ownerToken = urlParams.get('owner_token') || localStorage.getItem('pfp_gaming_token') || null;
const imageUrl   = urlParams.get('image_url')   || localStorage.getItem('pfp_gaming_image') || null;
if (cardId)      localStorage.setItem('pfp_gaming_card',  cardId);
if (ownerToken)  localStorage.setItem('pfp_gaming_token', ownerToken);
if (imageUrl)    localStorage.setItem('pfp_gaming_image', imageUrl);

let gamingXpBase = 0;
let xpLogged     = false;

function jsonp(url, cbParam) {
  return new Promise((resolve, reject) => {
    const name = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[name] = data => { delete window[name]; script.remove(); resolve(data); };
    script.onerror = reject;
    script.src = url + (url.includes('?') ? '&' : '?') + cbParam + '=' + name;
    document.head.appendChild(script);
  });
}

function loadGamingXP() {
  const cached = parseInt(sessionStorage.getItem('pfp_daily_xp_remaining'));
  if (!isNaN(cached)) {
    const el = document.getElementById('hud-daily-remaining');
    if (el) el.textContent = cached;
  }
  if (!cardId || !ownerToken) return;
  jsonp(`${API}?action=getGamingData&card_id=${encodeURIComponent(cardId)}&owner_token=${encodeURIComponent(ownerToken)}`, 'callback')
    .then(data => {
      if (data.success && data.gaming) {
        gamingXpBase = parseInt(data.gaming['Gaming XP']) || 0;
        const remaining = parseInt(data.gaming['Daily Remaining']);
        const safeRemaining = isNaN(remaining) ? 100 : remaining;
        sessionStorage.setItem('pfp_daily_xp_remaining', safeRemaining);
        const el = document.getElementById('hud-daily-remaining');
        if (el) el.textContent = safeRemaining;
      }
    })
    .catch(() => {});
}

function logGamingXP(delta) {
  if (!cardId || !ownerToken || delta <= 0 || xpLogged) return;
  xpLogged = true;
  jsonp(`${API}?action=logGamingXP&card_id=${encodeURIComponent(cardId)}&owner_token=${encodeURIComponent(ownerToken)}&xp_amount=${delta}`, 'callback')
    .then(data => {
      if (data.success) {
        const remaining = Math.max(0, data.remaining ?? 0);
        sessionStorage.setItem('pfp_daily_xp_remaining', remaining);
        const el = document.getElementById('hud-daily-remaining');
        if (el) el.textContent = remaining;
      }
    })
    .catch(() => {});
}

// ── STARFIELD ─────────────────────────────────────────────────
const sfCanvas = document.getElementById('starfield');
sfCanvas.width = window.innerWidth;
sfCanvas.height = window.innerHeight;
const sfCtx = sfCanvas.getContext('2d');
const stars = Array.from({length: 200}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.5,
  speed: 0.1 + Math.random() * 0.3,
  brightness: 0.3 + Math.random() * 0.7
}));

function animateStars() {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > sfCanvas.height) { s.y = 0; s.x = Math.random() * sfCanvas.width; }
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    sfCtx.fill();
  });
  requestAnimationFrame(animateStars);
}
animateStars();

let shieldTimer = 0;
let frameCount = 0;

// ── PLAYER ────────────────────────────────────────────────────
const PLAYER_W = 50, PLAYER_H = 36;
let player = { x: W/2, y: H - 60, speed: 5, invincible: 0 };

// ── BULLETS ──────────────────────────────────────────────────
let bullets = [];
let enemyBullets = [];
let lastShot = 0;
const SHOOT_COOLDOWN = 280;

// ── INVADERS ─────────────────────────────────────────────────
const INV_COLS = 8, INV_ROWS = 3;
const INV_W = 52, INV_H = 64;
const INV_PAD_X = 14, INV_PAD_Y = 14;
let invaders = [];
let invDir = 1;
let invSpeed = 0.6;
let invDropAmt = 20;
let invMoveTimer = 0;
let invMoveInterval = 60;
let invDescended = 0;

// ── DROPS ────────────────────────────────────────────────────
let drops = [];

// ── PARTICLES ────────────────────────────────────────────────
let particles = [];

// ── KEYS ─────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') e.preventDefault();
  if (e.code === 'Space' && state === 'playing') tryShoot();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── INIT WAVE ─────────────────────────────────────────────────
function initWave() {
  invaders = [];
  const startX = (W - (INV_COLS * (INV_W + INV_PAD_X))) / 2;
  const startY = 50;
  for (let r = 0; r < INV_ROWS; r++) {
    for (let c = 0; c < INV_COLS; c++) {
      invaders.push({
        x: startX + c * (INV_W + INV_PAD_X),
        y: startY + r * (INV_H + INV_PAD_Y),
        alive: true,
        hp: r === 0 ? 1 : r === 1 ? 2 : 3,
        maxHp: r === 0 ? 1 : r === 1 ? 2 : 3,
        flashTimer: 0,
        row: r
      });
    }
  }
  invDir = 1;
  invSpeed = 0.6 + (wave - 1) * 0.12;
  invMoveInterval = Math.max(18, 60 - (wave - 1) * 5);
  invDescended = 0;
  soundWave();
}

function startGame() {
  score = 0; wave = 1; lives = 5;
  multiplier = 1; multiplierTimer = 0;
  shieldActive = false; shieldTimer = 0;
  bullets = []; enemyBullets = []; drops = []; particles = [];
  player.x = W / 2;
  player.invincible = 0;
  frameCount = 0;
  updateHUD();
  initWave();
  state = 'playing';
}

// ── SHOOT ─────────────────────────────────────────────────────
function tryShoot() {
  const now = Date.now();
  if (now - lastShot < SHOOT_COOLDOWN) return;
  lastShot = now;
  bullets.push({ x: player.x, y: player.y - PLAYER_H / 2, w: 3, h: 14 });
  soundShoot();
}

// ── SPAWN EXPLOSION ───────────────────────────────────────────
function spawnExplosion(x, y, color = '#f0d070') {
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 / 18) * i + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

// ── DROP SPAWN ────────────────────────────────────────────────
function maybeSpawnDrop(x, y) {
  const roll = Math.random();
  let type = null;
  if (roll < 0.06) type = 'shield';
  else if (roll < 0.14) type = 'multiplier';
  else if (roll < 0.20) type = 'rapidfire';
  if (!type) return;
  drops.push({ x, y, type, vy: 1.8, life: 1 });
}

function flashDrop(type) {
  const labels = { shield: '🛡 SHIELD', multiplier: '×2 MULTIPLIER', rapidfire: '⚡ RAPID FIRE' };
  const el = document.getElementById('drop-flash');
  el.textContent = labels[type] || type;
  el.style.opacity = '1';
  setTimeout(() => { el.style.transition = 'opacity 0.8s'; el.style.opacity = '0'; }, 1200);
  setTimeout(() => { el.style.transition = ''; }, 2100);
}

// ── UPDATE HUD ────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-wave').textContent = `Wave ${wave}`;
  document.getElementById('multiplier-display').textContent = `×${multiplier} multiplier`;
  document.getElementById('hud-xp').textContent = Math.floor(score / 100).toLocaleString();

  const pips = document.querySelectorAll('.life-pip');
  pips.forEach((p, i) => {
    p.classList.toggle('dead', i >= lives);
  });
}

// ── DRAW PLAYER SHIP (PfP logo) ───────────────────────────────
function drawPlayer() {
  const x = player.x, y = player.y;
  if (player.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

  ctx.save();

  // Shield bubble
  if (shieldActive) {
    ctx.beginPath();
    ctx.arc(x, y - 4, 36, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,255,224,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,255,224,0.05)';
    ctx.fill();
  }

  // Ship body — sleek triangle with gold trim
  ctx.beginPath();
  ctx.moveTo(x, y - PLAYER_H / 2);
  ctx.lineTo(x - PLAYER_W / 2, y + PLAYER_H / 2);
  ctx.lineTo(x - 10, y + PLAYER_H / 2 - 10);
  ctx.lineTo(x, y + 10);
  ctx.lineTo(x + 10, y + PLAYER_H / 2 - 10);
  ctx.lineTo(x + PLAYER_W / 2, y + PLAYER_H / 2);
  ctx.closePath();
  ctx.fillStyle = '#0d1f14';
  ctx.fill();
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // PfP text on ship
  ctx.font = 'bold 10px "Cinzel", serif';
  ctx.fillStyle = '#c9a84c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PfP', x, y + 8);

  // Engine glow
  const grad = ctx.createRadialGradient(x, y + PLAYER_H/2, 0, x, y + PLAYER_H/2, 16);
  grad.addColorStop(0, 'rgba(46,204,113,0.6)');
  grad.addColorStop(1, 'rgba(46,204,113,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(x, y + PLAYER_H/2, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── DRAW INVADER ──────────────────────────────────────────────
function drawInvader(inv) {
  if (!inv.alive) return;
  const { x, y, hp, maxHp, flashTimer, row } = inv;

  ctx.save();

  // Flash red when hit
  if (flashTimer > 0) {
    ctx.globalAlpha = 0.6 + 0.4 * (flashTimer / 8);
  }

  // Card border color by row
  const borderColors = ['#c9a84c', '#e8c97a', '#ffffff'];
  const borderColor = borderColors[row] || '#c9a84c';

  // Card background
  ctx.fillStyle = '#0d1a10';
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 1.5;
  roundRect(ctx, x, y, INV_W, INV_H, 4);
  ctx.fill();
  ctx.stroke();

  // Card back image
  if (cardBackImg.complete && cardBackImg.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, x + 3, y + 3, INV_W - 6, INV_H - 20, 3);
    ctx.clip();
    ctx.drawImage(cardBackImg, x + 3, y + 3, INV_W - 6, INV_H - 20);
    ctx.restore();
  } else {
    ctx.font = '20px serif';
    ctx.fillStyle = borderColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ᚠ', x + INV_W/2, y + INV_H/2 - 8);
  }

  // HP bar
  const hpPct = hp / maxHp;
  ctx.fillStyle = '#0d1a10';
  ctx.fillRect(x + 3, y + INV_H - 11, INV_W - 6, 5);
  ctx.fillStyle = hpPct > 0.6 ? '#2ecc71' : hpPct > 0.3 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(x + 3, y + INV_H - 11, (INV_W - 6) * hpPct, 5);

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── DRAW DROP ─────────────────────────────────────────────────
function drawDrop(drop) {
  const colors = { shield: '#00ffe0', multiplier: '#c9a84c', rapidfire: '#e74c3c' };
  const icons  = { shield: '🛡', multiplier: '×2', rapidfire: '⚡' };
  const color  = colors[drop.type] || '#fff';
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.font = '14px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(icons[drop.type], drop.x, drop.y);
  ctx.restore();
}

// ── GAME LOOP ─────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  if (state !== 'playing') return;

  frameCount++;
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(46,180,90,0.03)';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
  for (let gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

  // Ground line
  ctx.strokeStyle = 'rgba(201,168,76,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30); ctx.stroke();

  // ── PLAYER MOVE ──
  if (keys['ArrowLeft'])  player.x = Math.max(PLAYER_W/2, player.x - player.speed);
  if (keys['ArrowRight']) player.x = Math.min(W - PLAYER_W/2, player.x + player.speed);
  if (player.invincible > 0) player.invincible--;
  if (shieldTimer > 0) { shieldTimer--; if (shieldTimer === 0) shieldActive = false; }
  if (multiplierTimer > 0) { multiplierTimer--; if (multiplierTimer === 0) { multiplier = 1; updateHUD(); } }

  // ── BULLETS ──
  bullets = bullets.filter(b => b.y > -20);
  bullets.forEach(b => {
    b.y -= 10;
    ctx.fillStyle = '#f0d070';
    ctx.shadowColor = '#f0d070';
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  });

  // ── ENEMY BULLETS ──
  enemyBullets = enemyBullets.filter(b => b.y < H + 20);
  enemyBullets.forEach(b => {
    b.y += b.speed;
    ctx.fillStyle = '#e74c3c';
    ctx.shadowColor = '#e74c3c';
    ctx.shadowBlur = 6;
    ctx.fillRect(b.x - 2, b.y, 4, 12);
    ctx.shadowBlur = 0;
  });

  // ── INVADER MOVEMENT ──
  invMoveTimer++;
  if (invMoveTimer >= invMoveInterval) {
    invMoveTimer = 0;
    const alive = invaders.filter(i => i.alive);
    if (alive.length === 0) { nextWave(); return; }

    const leftmost  = Math.min(...alive.map(i => i.x));
    const rightmost = Math.max(...alive.map(i => i.x + INV_W));

    let shouldDrop = false;
    if (invDir === 1 && rightmost >= W - 10) { invDir = -1; shouldDrop = true; }
    if (invDir === -1 && leftmost <= 10) { invDir = 1; shouldDrop = true; }

    invaders.forEach(inv => {
      if (!inv.alive) return;
      if (shouldDrop) { inv.y += invDropAmt; invDescended += invDropAmt; }
      else inv.x += invDir * invSpeed * invMoveInterval;
      if (inv.flashTimer > 0) inv.flashTimer--;
    });

    // Enemy shoot
    const shooters = alive.filter((_, i, arr) => {
      const col = invaders.indexOf(alive[i]) % INV_COLS;
      return arr.filter(a => invaders.indexOf(a) % INV_COLS === col && a.y > alive[i].y).length === 0;
    });
    const shootChance = 0.12 + (wave - 1) * 0.04;
    shooters.forEach(inv => {
      if (Math.random() < shootChance) {
        enemyBullets.push({
          x: inv.x + INV_W/2,
          y: inv.y + INV_H,
          speed: 3 + wave * 0.3
        });
      }
    });
  }

  // ── DRAW INVADERS ──
  invaders.forEach(drawInvader);

  // ── DROPS ──
  drops.forEach(d => { d.y += d.vy; drawDrop(d); });
  drops = drops.filter(d => d.y < H + 30);

  // ── COLLISION: BULLETS → INVADERS ──
  bullets.forEach((b, bi) => {
    invaders.forEach(inv => {
      if (!inv.alive) return;
      if (b.x > inv.x && b.x < inv.x + INV_W && b.y > inv.y && b.y < inv.y + INV_H) {
        bullets.splice(bi, 1);
        inv.hp--;
        inv.flashTimer = 8;
        soundHit();
        if (inv.hp <= 0) {
          inv.alive = false;
          const pts = (inv.row + 1) * 10 * wave * multiplier;
          score += pts;
          spawnExplosion(inv.x + INV_W/2, inv.y + INV_H/2);
          soundExplode();
          maybeSpawnDrop(inv.x + INV_W/2, inv.y + INV_H/2);
          updateHUD();
        }
      }
    });
  });

  // ── COLLISION: ENEMY BULLETS → PLAYER ──
  if (player.invincible === 0) {
    enemyBullets.forEach((b, bi) => {
      const px = player.x, py = player.y;
      if (b.x > px - PLAYER_W/2 && b.x < px + PLAYER_W/2 && b.y > py - PLAYER_H/2 && b.y < py + PLAYER_H/2) {
        enemyBullets.splice(bi, 1);
        if (shieldActive) {
          shieldActive = false; shieldTimer = 0;
          soundShield();
          spawnExplosion(px, py, '#00ffe0');
        } else {
          loseLife();
        }
      }
    });
  }

  // ── COLLISION: INVADER REACHES PLAYER ──
  invaders.forEach(inv => {
    if (!inv.alive) return;
    if (inv.y + INV_H >= player.y - PLAYER_H/2 && player.invincible === 0) {
      if (inv.x < player.x + PLAYER_W/2 && inv.x + INV_W > player.x - PLAYER_W/2) {
        inv.alive = false;
        spawnExplosion(inv.x + INV_W/2, inv.y + INV_H/2);
        loseLife();
      }
    }
  });

  // ── COLLISION: DROPS → PLAYER ──
  drops.forEach((d, di) => {
    if (Math.abs(d.x - player.x) < 28 && Math.abs(d.y - player.y) < 28) {
      drops.splice(di, 1);
      soundPowerup();
      flashDrop(d.type);
      if (d.type === 'shield') { shieldActive = true; shieldTimer = 600; }
      if (d.type === 'multiplier') { multiplier = 2; multiplierTimer = 600; updateHUD(); }
      if (d.type === 'rapidfire') { /* handled via lastShot reduction */ lastShot -= 200; }
    }
  });

  // ── PARTICLES ──
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);

  // ── DRAW PLAYER ──
  drawPlayer();

  // ── CHECK INVADERS REACHED BOTTOM ──
  const alive = invaders.filter(i => i.alive);
  if (alive.length > 0 && Math.max(...alive.map(i => i.y + INV_H)) >= H - 30) {
    loseLife(true);
  }

  // ── WAVE CLEAR ──
  if (alive.length === 0) nextWave();
}

function loseLife(resetInvaders = false) {
  lives--;
  soundDeath();
  player.invincible = 120;
  spawnExplosion(player.x, player.y, '#e74c3c');
  updateHUD();

  if (resetInvaders) {
    enemyBullets = [];
    initWave();
  }

  if (lives <= 0) {
    setTimeout(gameOver, 600);
  }
}

function nextWave() {
  wave++;
  enemyBullets = [];
  drops = [];
  updateHUD();
  initWave();
}

function gameOver() {
  state = 'dead';
  const rawXP = Math.floor(score / 100);
  const dailyRemaining = Math.max(0, parseInt(sessionStorage.getItem('pfp_daily_xp_remaining')) || 0);
  const xpEarned = Math.min(rawXP, dailyRemaining);

  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('final-wave').textContent = `Reached Wave ${wave}`;
  document.getElementById('overlay-dead').style.display = 'flex';

  sessionStorage.setItem('pfp_gaming_stats', JSON.stringify({ game: 'card-attack', score, wave, xp: xpEarned }));

  logGamingXP(xpEarned);

  if (cardId && ownerToken) {
    const resultUrl = `${API}?action=logGameResult&card_id=${encodeURIComponent(cardId)}&owner_token=${encodeURIComponent(ownerToken)}&game=Card%20Attack&xp_delta=${xpEarned}&rounds=1&wins=0&best_score=${score}&best_wave=${wave}`;
    jsonp(resultUrl, 'callback').catch(e => console.warn('logGameResult failed:', e));
  }
}
  
// ── BUTTONS ───────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  unlockAudio();
  document.getElementById('overlay-start').style.display = 'none';
  startGame();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  unlockAudio();
  document.getElementById('overlay-dead').style.display = 'none';
  startGame();
});

// ── KICK OFF ──────────────────────────────────────────────────
gameLoop();
</script>
