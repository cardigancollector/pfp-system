<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>PfP — My Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: #7a6030;
    --dark: #0e0c09; --dark2: #1a1710; --dark3: #251f14;
    --charcoal: #2a2520; --text: #e8d9b8; --text-dim: #9a8a6a;
    --red: #c0392b; --green: #2ecc71;
    --glass: rgba(14,12,9,0.72); --glass-border: rgba(201,168,76,0.25);
    --glass-border-hover: rgba(201,168,76,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'EB Garamond',serif; background:var(--dark); color:var(--text); min-height:100vh; overflow-x:hidden; }

  .bg-layer { position:fixed; inset:0; background-image:url('pfp_bg.jpg'); background-size:cover; background-position:center top; background-attachment:fixed; z-index:0; }
  .bg-overlay { position:fixed; inset:0; background:linear-gradient(160deg,rgba(14,12,9,0.92) 0%,rgba(14,12,9,0.80) 40%,rgba(14,12,9,0.88) 100%); z-index:1; }

  /* ── HEADER ── */
  .header {
    position:sticky; top:0; z-index:50;
    background:rgba(10,9,6,0.95); border-bottom:1px solid var(--glass-border);
    padding:0 40px; height:64px; display:flex; align-items:center;
    justify-content:space-between; backdrop-filter:blur(12px);
  }
  .header-logo { font-family:'Cinzel Decorative',serif; font-size:1.3rem; color:var(--gold); letter-spacing:0.06em; text-decoration:none; }
  .header-title { font-family:'Cinzel',serif; font-size:0.78rem; color:var(--text-dim); letter-spacing:0.25em; text-transform:uppercase; }

  /* ── CONTENT ── */
  .content { position:relative; z-index:2; max-width:1400px; margin:0 auto; padding:48px 40px 80px; }

  .page-hero { margin-bottom:48px; }
  .page-eyebrow { font-family:'Cinzel Decorative',serif; font-size:0.65rem; color:var(--gold-dim); letter-spacing:0.4em; text-transform:uppercase; margin-bottom:10px; }
  .page-title { font-family:'Cinzel',serif; font-size:2.6rem; color:var(--text); font-weight:700; line-height:1.1; margin-bottom:10px; }
  .page-meta { font-size:0.9rem; color:var(--text-dim); font-style:italic; }

  .section-title {
    font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.35em;
    text-transform:uppercase; color:var(--gold-dim); margin-bottom:20px;
    display:flex; align-items:center; gap:12px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--glass-border),transparent); }

  /* ── EMPTY STATE ── */
  #empty-state {
    display:none; text-align:center; padding:80px 40px;
    border:1px solid var(--glass-border); background:var(--glass);
    backdrop-filter:blur(16px);
  }
  .empty-icon { font-size:3rem; margin-bottom:20px; opacity:0.4; }
  .empty-title { font-family:'Cinzel',serif; font-size:1.2rem; color:var(--text-dim); margin-bottom:10px; }
  .empty-msg { font-size:0.88rem; color:var(--text-dim); font-style:italic; line-height:1.7; max-width:400px; margin:0 auto 24px; }
  .empty-hint { font-size:0.78rem; color:var(--gold-dim); letter-spacing:0.1em; }

  /* ── CARD GRID ── */
  .card-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:24px;
  }

  /* ── CARD TILE ── */
  .card-tile {
    position:relative; cursor:pointer;
    background:rgba(14,12,9,0.85);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(12px);
    transition:transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    text-decoration:none; color:inherit;
    display:block; overflow:hidden;
    animation:fadeUp 0.5s ease both;
  }
  .card-tile:hover {
    transform:translateY(-4px);
    border-color:var(--glass-border-hover);
    box-shadow:0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.08);
  }

  /* art wrapper — fixed aspect ratio portrait */
  .tile-art-wrap {
    position:relative; width:100%; aspect-ratio:3/4; overflow:hidden;
    background:var(--dark3);
  }
  .tile-art-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s; }
  .card-tile:hover .tile-art-wrap img { transform:scale(1.04); }
  .tile-art-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:0.72rem; letter-spacing:0.15em; color:var(--text-dim); text-transform:uppercase; }

  /* stage glow borders on the art */
  .tile-art-wrap::before {
    content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
    border:3px solid transparent; transition:border-color 0.4s, box-shadow 0.4s;
  }
  .tile-stage-dormant     .tile-art-wrap::before { border-color:#1e1a14; box-shadow:inset 0 0 30px rgba(0,0,0,0.7); }
  .tile-stage-awakened    .tile-art-wrap::before { border-color:#b87333; box-shadow:0 0 14px rgba(184,115,51,0.35), inset 0 0 14px rgba(184,115,51,0.08); animation:pulse-awk 3.5s ease-in-out infinite; }
  .tile-stage-growing     .tile-art-wrap::before { border-color:#c97a2a; box-shadow:0 0 22px rgba(201,122,42,0.5), inset 0 0 18px rgba(201,122,42,0.1); animation:pulse-grw 2.8s ease-in-out infinite; }
  .tile-stage-established .tile-art-wrap::before { border-color:#d0d0d0; box-shadow:0 0 22px rgba(200,200,200,0.4), inset 0 0 14px rgba(200,200,200,0.06); animation:pulse-est 3s ease-in-out infinite; }
  .tile-stage-renowned    .tile-art-wrap::before { border-color:var(--gold); box-shadow:0 0 28px rgba(201,168,76,0.65), inset 0 0 20px rgba(201,168,76,0.12); animation:pulse-ren 2.2s ease-in-out infinite; }
  .tile-stage-legendary   .tile-art-wrap::before { border-color:var(--gold-light); box-shadow:0 0 40px rgba(232,201,122,0.85), inset 0 0 30px rgba(232,201,122,0.18); animation:burst-leg 1.8s ease-in-out infinite; }
  .tile-stage-mythic      .tile-art-wrap::before { animation:aurora-myt 2.5s linear infinite; }

  @keyframes pulse-awk  { 0%,100%{box-shadow:0 0 10px rgba(184,115,51,0.2),inset 0 0 8px rgba(184,115,51,0.05)} 50%{box-shadow:0 0 28px rgba(184,115,51,0.5),inset 0 0 18px rgba(184,115,51,0.1)} }
  @keyframes pulse-grw  { 0%,100%{opacity:.75} 50%{opacity:1} }
  @keyframes pulse-est  { 0%,100%{box-shadow:0 0 18px rgba(200,200,200,0.3)} 50%{box-shadow:0 0 38px rgba(220,220,220,0.55)} }
  @keyframes pulse-ren  { 0%,100%{box-shadow:0 0 22px rgba(201,168,76,0.5),inset 0 0 14px rgba(201,168,76,0.08)} 50%{box-shadow:0 0 44px rgba(201,168,76,0.85),inset 0 0 28px rgba(201,168,76,0.18)} }
  @keyframes burst-leg  { 0%,100%{box-shadow:0 0 35px rgba(232,201,122,0.7),inset 0 0 25px rgba(232,201,122,0.14)} 35%{box-shadow:0 0 65px rgba(255,235,150,1.0),inset 0 0 50px rgba(255,235,150,0.28)} 70%{box-shadow:0 0 28px rgba(232,201,122,0.5),inset 0 0 18px rgba(232,201,122,0.1)} }
  @keyframes aurora-myt {
    0%   { border-color:#a8d8ea; box-shadow:0 0 50px rgba(168,216,234,0.8),inset 0 0 40px rgba(168,216,234,0.15); }
    33%  { border-color:#e8c97a; box-shadow:0 0 50px rgba(232,201,122,0.8),inset 0 0 40px rgba(232,201,122,0.15); }
    66%  { border-color:#d4a8f0; box-shadow:0 0 50px rgba(212,168,240,0.8),inset 0 0 40px rgba(212,168,240,0.15); }
    100% { border-color:#a8d8ea; box-shadow:0 0 50px rgba(168,216,234,0.8),inset 0 0 40px rgba(168,216,234,0.15); }
  }

  /* stage image filters */
  .tile-stage-dormant     .tile-art-wrap img { filter:saturate(0) brightness(0.6) contrast(0.9); }
  .tile-stage-awakened    .tile-art-wrap img { filter:saturate(0.7) brightness(0.9); }
  .tile-stage-growing     .tile-art-wrap img { filter:saturate(1.1) brightness(1.0); }
  .tile-stage-established .tile-art-wrap img { filter:saturate(1.05) brightness(1.05); }
  .tile-stage-renowned    .tile-art-wrap img { filter:saturate(1.15) brightness(1.08); }
  .tile-stage-legendary   .tile-art-wrap img { filter:saturate(1.25) brightness(1.12) contrast(1.05); }
  .tile-stage-mythic      .tile-art-wrap img { filter:saturate(1.35) brightness(1.15) contrast(1.08); }

  /* stage badge overlay */
  .tile-stage-badge {
    position:absolute; bottom:10px; left:10px; z-index:3;
    background:rgba(10,9,6,0.82); border:1px solid var(--glass-border);
    padding:4px 10px; font-family:'Cinzel',serif; font-size:0.6rem;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--gold);
    backdrop-filter:blur(8px);
  }

  /* loading skeleton shimmer on the art */
  .tile-art-wrap.loading { background:var(--dark3); }
  .tile-art-wrap.loading::after {
    content:''; position:absolute; inset:0; z-index:4;
    background:linear-gradient(90deg,transparent,rgba(201,168,76,0.06),transparent);
    animation:shimmer 1.6s infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  /* card info below art */
  .tile-info { padding:16px 18px 18px; }
  .tile-card-name {
    font-family:'Cinzel',serif; font-size:0.88rem; color:var(--text);
    margin-bottom:6px; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .tile-card-id { font-family:monospace; font-size:0.68rem; color:var(--gold-dim); letter-spacing:0.08em; margin-bottom:12px; }

  .tile-xp-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .tile-xp-val { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--gold); }
  .tile-xp-label { font-size:0.62rem; color:var(--text-dim); letter-spacing:0.15em; text-transform:uppercase; }

  .tile-xp-bar-track { height:3px; background:var(--charcoal); border-radius:2px; overflow:hidden; }
  .tile-xp-bar-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:2px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }

  .tile-meta-row { display:flex; justify-content:space-between; margin-top:10px; font-size:0.72rem; color:var(--text-dim); }
  .tile-streak { color:var(--gold-dim); }
  .tile-days-since { }
  .tile-days-warn { color:var(--red); }

  /* skeleton text lines while loading */
  .tile-skel { height:12px; background:var(--charcoal); border-radius:2px; margin-bottom:8px; animation:shimmer-block 1.6s infinite; background-size:200% 100%; background-image:linear-gradient(90deg,var(--charcoal) 25%,rgba(201,168,76,0.07) 50%,var(--charcoal) 75%); }
  @keyframes shimmer-block { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── STATS BAR ── */
  .stats-bar {
    display:flex; gap:32px; margin-bottom:40px; padding:20px 28px;
    background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(16px);
    flex-wrap:wrap;
  }
  .stats-bar-item { display:flex; flex-direction:column; gap:4px; }
  .stats-bar-val { font-family:'Cinzel',serif; font-size:1.3rem; color:var(--gold); }
  .stats-bar-lbl { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  /* ── RESPONSIVE ── */
  @media (max-width:900px) {
    .content { padding:32px 16px 60px; }
    .header { padding:0 16px; }
    .card-grid { grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:16px; }
    .page-title { font-size:1.9rem; }
    .stats-bar { gap:20px; padding:16px 20px; }
  }
  @media (max-width:480px) {
    .card-grid { grid-template-columns:repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<header class="header">
  <a class="header-logo" href="#">PfP</a>
  <div class="header-title">My Collection</div>
</header>

<div class="content">

  <div class="page-hero">
    <div class="page-eyebrow">Profile for People</div>
    <div class="page-title">My Collection</div>
    <div class="page-meta" id="page-meta">Scanning for cards on this device…</div>
  </div>

  <div id="empty-state">
    <div class="empty-icon">🃏</div>
    <div class="empty-title">No Cards Found</div>
    <div class="empty-msg">No claimed cards were found on this device. Scan a card QR code or visit a card's dashboard and claim it with your claim code.</div>
    <div class="empty-hint">Cards are stored locally per device.</div>
  </div>

  <div id="collection-view" style="display:none;">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="section-title" id="collection-section-title">Your Cards</div>
    <div class="card-grid" id="card-grid"></div>
  </div>

</div>

<script>
const LIVING_API = 'https://script.google.com/macros/s/AKfycbwtgR6eiGfCtBSij8OhbxNyaQ5CPI0KpbuAZ9Rmw2SXHj-0EmRU20PVGpq5SRPX3OMy/exec';
const ANALYZER_API = 'https://script.google.com/macros/s/AKfycbyq1AQ85ctZyKWXflBEX2r7mxTdyBxJOYXSlNcDgLGotqu28buVV4YHfBmO1MOvGDc/exec';

const STAGES     = ['Dormant','Awakened','Growing','Established','Renowned','Legendary','Mythic'];
const STAGE_XP   = [0, 500, 1500, 5000, 12000, 25000, 50000];
const STAGE_KEYS = ['dormant','awakened','growing','established','renowned','legendary','mythic'];
const STAGE_ICONS= ['💤','🌅','🌱','🏛️','🌟','⚚','🔮'];

function jsonpFetch(url, timeout) {
  return new Promise((resolve, reject) => {
    const cbName = 'pfp_cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeout || 10000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (document.body.contains(script)) document.body.removeChild(script);
    }
    window[cbName] = function(data) { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('script error')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName + '&_=' + Date.now();
    document.body.appendChild(script);
  });
}

function getStageIndex(stageName) {
  const s = (stageName || '').toUpperCase();
  const map = { DORMANT:0, AWAKENED:1, GROWING:2, ESTABLISHED:3, RENOWNED:4, LEGENDARY:5, MYTHIC:6 };
  return map[s] ?? 0;
}

function xpBarPct(xp, stageIdx) {
  const lo = STAGE_XP[stageIdx]        || 0;
  const hi = STAGE_XP[stageIdx + 1]    || lo + 1;
  return Math.min(100, Math.max(0, Math.round(((xp - lo) / (hi - lo)) * 100)));
}

// ── Scan localStorage for all pfp_owner_* entries ──
function scanOwnedCards() {
  const owned = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('pfp_owner_')) continue;
    const cardId = key.replace('pfp_owner_', '');
    if (!cardId) continue;
    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (data && data.ownerToken) {
        owned.push({ cardId, ownerToken: data.ownerToken, cardName: data.cardName || cardId });
      }
    } catch(e) {}
  }
  return owned;
}

// ── Build a skeleton tile while data loads ──
function buildSkeletonTile(cardId, cardName) {
  const tile = document.createElement('a');
  tile.className = 'card-tile tile-stage-dormant';
  tile.href = 'index.html?card_id=' + encodeURIComponent(cardId);
  tile.innerHTML = `
    <div class="tile-art-wrap loading">
      <div class="tile-art-placeholder">Loading…</div>
    </div>
    <div class="tile-info">
      <div class="tile-card-name">${esc(cardName)}</div>
      <div class="tile-card-id">${esc(cardId)}</div>
      <div class="tile-skel" style="width:60%"></div>
      <div class="tile-skel" style="width:40%"></div>
      <div class="tile-skel" style="width:100%;margin-top:4px;height:3px;"></div>
    </div>
  `;
  return tile;
}

// ── Hydrate a tile with live card data ──
function hydrateTile(tile, card) {
  const stageName = String(card['Evolution Stage'] || 'DORMANT');
  const stageIdx  = getStageIndex(stageName);
  const stageKey  = STAGE_KEYS[stageIdx];
  const xp        = Number(card['Current XP'] || 0);
  const gamingXP  = Number(card['Gaming XP']  || 0);
  const totalXP   = xp + gamingXP;
  const streak    = Number(card['Streak (days)'] || 0);
  const daysSince = Number(card['Days Since Scan'] || 0);
  const pct       = xpBarPct(xp, stageIdx);

  // update stage class
  tile.className = tile.className.replace(/tile-stage-\w+/, '') + ' tile-stage-' + stageKey;

  // art
  const artWrap = tile.querySelector('.tile-art-wrap');
  artWrap.classList.remove('loading');
  const imageUrl = card['_imageUrl'] || '';
  if (imageUrl) {
    artWrap.innerHTML = `
      <img src="${esc(imageUrl)}" alt="${esc(card['Card Name'] || '')}" loading="lazy">
      <div class="tile-stage-badge">${STAGE_ICONS[stageIdx]} ${stageName}</div>
    `;
  } else {
    artWrap.innerHTML = `
      <div class="tile-art-placeholder">${STAGE_ICONS[stageIdx]}</div>
      <div class="tile-stage-badge">${stageName}</div>
    `;
  }

  // info
  const daysSinceClass = daysSince >= 7 ? 'tile-days-warn' : 'tile-days-since';
  tile.querySelector('.tile-info').innerHTML = `
    <div class="tile-card-name">${esc(card['Card Name'] || card['_cardId'])}</div>
    <div class="tile-card-id">${esc(card['_cardId'])}</div>
    <div class="tile-xp-row">
      <div class="tile-xp-val">${totalXP.toLocaleString()} <span style="font-size:0.7rem;color:var(--text-dim);font-family:'EB Garamond',serif;">XP</span></div>
      <div class="tile-xp-label">Total</div>
    </div>
    <div class="tile-xp-bar-track"><div class="tile-xp-bar-fill" style="width:${pct}%"></div></div>
    <div class="tile-meta-row">
      <span class="tile-streak">🔥 ${streak}d streak</span>
      <span class="${daysSinceClass}">${daysSince === 0 ? 'Scanned today' : daysSince + 'd since scan'}</span>
    </div>
  `;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Main ──
window.addEventListener('DOMContentLoaded', async () => {
  const owned = scanOwnedCards();

  if (owned.length === 0) {
    document.getElementById('page-meta').textContent = 'No cards claimed on this device.';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }

  document.getElementById('page-meta').textContent =
    owned.length === 1 ? '1 card on this device' : owned.length + ' cards on this device';
  document.getElementById('collection-view').style.display = 'block';
  document.getElementById('collection-section-title').textContent =
    'Your Cards (' + owned.length + ')';

  const grid = document.getElementById('card-grid');

  // Build skeleton tiles immediately
  const tiles = {};
  owned.forEach((o, idx) => {
    const tile = buildSkeletonTile(o.cardId, o.cardName);
    tile.style.animationDelay = (idx * 0.06) + 's';
    grid.appendChild(tile);
    tiles[o.cardId] = tile;
  });

  // Fetch live data and analyzer data for all cards in parallel
  const results = await Promise.allSettled(
    owned.map(async o => {
      const [livingData, analyzerData] = await Promise.allSettled([
        jsonpFetch(
          LIVING_API + '?action=get_card&card_id=' + encodeURIComponent(o.cardId)
          + '&owner_token=' + encodeURIComponent(o.ownerToken),
          10000
        ),
        jsonpFetch(
          ANALYZER_API + '?action=getCardByEvoId&evoId=' + encodeURIComponent(o.cardId),
          10000
        )
      ]);
      const imageUrl = (analyzerData.status === 'fulfilled' && analyzerData.value?.card?.imageUrl)
        ? analyzerData.value.card.imageUrl : '';
      return { cardId: o.cardId, ownerToken: o.ownerToken, data: livingData.value || null, imageUrl };
    })
  );

  // Hydrate tiles and collect stats
  let totalXPAll = 0, highestStageIdx = 0, cardsWithData = 0;

  results.forEach(result => {
    if (result.status !== 'fulfilled') return;
    const { cardId, data } = result.value;
    if (!data || !data.success || !data.card) return;

    const card = data.card;
    card['_cardId']   = cardId;
    card['_imageUrl'] = result.value.imageUrl || '';

    const tile = tiles[cardId];
    if (tile) hydrateTile(tile, card);

    const xp       = Number(card['Current XP'] || 0) + Number(card['Gaming XP'] || 0);
    const stageIdx = getStageIndex(card['Evolution Stage']);
    totalXPAll += xp;
    if (stageIdx > highestStageIdx) highestStageIdx = stageIdx;
    cardsWithData++;
  });

  // Stats bar
  if (cardsWithData > 0) {
    const statsBar = document.getElementById('stats-bar');
    statsBar.innerHTML = `
      <div class="stats-bar-item">
        <div class="stats-bar-val">${owned.length}</div>
        <div class="stats-bar-lbl">Cards Held</div>
      </div>
      <div class="stats-bar-item">
        <div class="stats-bar-val">${totalXPAll.toLocaleString()}</div>
        <div class="stats-bar-lbl">Total XP Across Cards</div>
      </div>
      <div class="stats-bar-item">
        <div class="stats-bar-val">${STAGE_ICONS[highestStageIdx]} ${STAGES[highestStageIdx]}</div>
        <div class="stats-bar-lbl">Highest Stage</div>
      </div>
    `;
  }
});
</script>
