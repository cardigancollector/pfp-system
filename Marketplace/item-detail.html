<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP Marketplace — Item Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111318;
      --surface:   #1c1f27;
      --border:    rgba(232, 228, 220, 0.12);
      --border-md: rgba(232, 228, 220, 0.28);
      --text:      #e8e4dc;
      --muted:     #a8a9ad;
      --gold:      #c9a84c;
      --red:       #e74c3c;
      --green:     #2ecc71;
      --font-display: 'Cinzel Decorative', serif;
      --font-body:    'Crimson Pro', Georgia, serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(201,168,76,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── ERROR SCREEN ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    #error-screen.visible { display: flex; }

    .error-title {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text);
      letter-spacing: 1px;
    }

    .error-msg {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
    }

    .error-back {
      margin-top: 12px;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .error-back:hover { opacity: 1; }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 60px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .page.visible { opacity: 1; }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 20px 18px;
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text);
      text-decoration: none;
    }

    .xp-wrap { text-align: right; }
    .xp-label {
      display: block;
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1px;
    }
    .xp-value {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text);
      letter-spacing: 1px;
    }

    /* ── IMAGE ── */
    .image-wrap {
      display: flex;
      justify-content: center;
      padding: 28px 20px 0;
      animation: fadeDown 0.7s ease both;
    }

    .item-image {
      position: relative;
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .item-image.poker {
      width: 200px;
      aspect-ratio: 2.5 / 3.5;
    }

    .item-image.square {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1;
    }

    .item-image svg { opacity: 0.2; }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
    }
    .corner.tl { top: 8px; left: 8px; border-top: 0.5px solid var(--muted); border-left: 0.5px solid var(--muted); }
    .corner.tr { top: 8px; right: 8px; border-top: 0.5px solid var(--muted); border-right: 0.5px solid var(--muted); }
    .corner.bl { bottom: 8px; left: 8px; border-bottom: 0.5px solid var(--muted); border-left: 0.5px solid var(--muted); }
    .corner.br { bottom: 8px; right: 8px; border-bottom: 0.5px solid var(--muted); border-right: 0.5px solid var(--muted); }

    .type-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      background: var(--bg);
      border: 0.5px solid var(--border-md);
      color: var(--muted);
    }

    /* Sold out overlay on image */
    .sold-out-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(17,19,24,0.75);
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .sold-out-overlay.visible { display: flex; }

    /* ── TITLE ── */
    .item-title-wrap {
      padding: 24px 20px 0;
      animation: fadeUp 0.7s ease 0.08s both;
    }

    .item-eyebrow {
      font-size: 8px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .item-title {
      font-family: var(--font-display);
      font-size: clamp(14px, 3.5vw, 18px);
      color: var(--text);
      letter-spacing: 1px;
      line-height: 1.4;
    }

    /* ── META STRIP ── */
    .meta-strip {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin: 20px 20px 0;
      padding: 16px 0;
      border-top: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      animation: fadeUp 0.7s ease 0.14s both;
    }

    .meta-item { text-align: center; }

    .meta-val {
      display: block;
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .meta-lbl {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .meta-divider {
      width: 0.5px;
      height: 32px;
      background: var(--border-md);
    }

    /* ── AVAILABILITY BAR ── */
    .avail-wrap {
      margin: 16px 20px 0;
      animation: fadeUp 0.7s ease 0.18s both;
    }

    .avail-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .avail-track {
      height: 2px;
      background: rgba(201,168,76,0.12);
      overflow: hidden;
    }

    .avail-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 1s cubic-bezier(0.16,1,0.3,1);
    }

    /* ── DESCRIPTION ── */
    .description {
      padding: 22px 20px;
      animation: fadeUp 0.7s ease 0.2s both;
    }

    .desc-eyebrow {
      font-size: 8px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .desc-text {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.75;
      font-style: italic;
    }

    /* ── REDEEM SECTION ── */
    .redeem-section {
      margin: 0 20px;
      border: 0.5px solid var(--border);
      background: var(--surface);
      padding: 20px;
      animation: fadeUp 0.7s ease 0.26s both;
    }

    .redeem-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .redeem-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .redeem-cost {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--text);
    }

    /* Afford status line */
    .afford-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
      font-size: 11px;
      font-style: italic;
    }

    .afford-row.can   { color: var(--green); }
    .afford-row.cannot { color: var(--red); }

    .btn-redeem {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 4px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-redeem:hover:not(.disabled) { opacity: 0.9; }
    .btn-redeem:active:not(.disabled) { transform: scale(0.99); }

    .btn-redeem.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-label">Loading item…</div>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="error-title">Item Not Found</div>
  <div class="error-msg" id="error-msg">This item could not be loaded.</div>
  <a class="error-back" href="marketplace.html">← Back to Marketplace</a>
</div>

<!-- Page -->
<div class="page" id="page">

  <header class="header">
    <a class="logo" href="spotlight.html">XP Marketplace</a>
    <div class="xp-wrap">
      <span class="xp-label">Available XP</span>
      <span class="xp-value" id="header-xp">—</span>
    </div>
  </header>

  <div class="image-wrap">
    <div class="item-image" id="item-image">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="type-badge" id="type-badge">Card</div>
      <div class="sold-out-overlay" id="sold-out-overlay">Sold Out</div>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="1" y="1" width="46" height="46" stroke="#e8e4dc" stroke-width="0.5"/>
        <line x1="1" y1="1" x2="47" y2="47" stroke="#e8e4dc" stroke-width="0.5"/>
        <line x1="47" y1="1" x2="1" y2="47" stroke="#e8e4dc" stroke-width="0.5"/>
      </svg>
    </div>
  </div>

  <div class="item-title-wrap">
    <div class="item-eyebrow" id="item-eyebrow">Card</div>
    <div class="item-title" id="item-title">—</div>
  </div>

  <div class="meta-strip">
    <div class="meta-item">
      <span class="meta-val" id="editions-issued">—</span>
      <span class="meta-lbl">Editions Issued</span>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <span class="meta-val" id="editions-remaining">—</span>
      <span class="meta-lbl">Remaining</span>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <span class="meta-val" id="date-issued">—</span>
      <span class="meta-lbl">Date Listed</span>
    </div>
  </div>

  <div class="avail-wrap">
    <div class="avail-label-row">
      <span>Availability</span>
      <span id="avail-text">—</span>
    </div>
    <div class="avail-track">
      <div class="avail-fill" id="avail-fill"></div>
    </div>
  </div>

  <div class="description">
    <div class="desc-eyebrow">Description</div>
    <p class="desc-text" id="item-description">—</p>
  </div>

  <div class="redeem-section">
    <div class="redeem-row">
      <span class="redeem-label">Redeem for</span>
      <span class="redeem-cost" id="redeem-cost">—</span>
    </div>
    <div class="afford-row" id="afford-row"></div>
    <a class="btn-redeem" id="btn-redeem" href="#">Redeem This Item</a>
  </div>

  <a class="back-link" id="back-link" href="marketplace.html">← Back to Marketplace</a>

</div>

<script type="module">
  import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyCnZez3HLcarYUo8mAYyj9p7K6zbqwE_KU",
    authDomain:        "pfp-system.firebaseapp.com",
    projectId:         "pfp-system",
    storageBucket:     "pfp-system.appspot.com",
    messagingSenderId: "643360345707",
    appId:             "1:643360345707:web:9e5b9a902b41169ae5eb2e"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const LIVING_API = 'https://script.google.com/macros/s/AKfycbwtgR6eiGfCtBSij8OhbxNyaQ5CPI0KpbuAZ9Rmw2SXHj-0EmRU20PVGpq5SRPX3OMy/exec';

  // ── JSONP ──
  function jsonpFetch(url, timeout) {
    return new Promise((resolve, reject) => {
      const cb     = 'pfp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 9999);
      const script = document.createElement('script');
      const timer  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeout || 10000);
      function cleanup() {
        clearTimeout(timer);
        delete window[cb];
        if (document.body.contains(script)) document.body.removeChild(script);
      }
      window[cb]     = data => { cleanup(); resolve(data); };
      script.onerror = ()   => { cleanup(); reject(new Error('script error')); };
      script.src     = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb + '&_=' + Date.now();
      document.body.appendChild(script);
    });
  }

  function fmt(n) { return Number(n || 0).toLocaleString(); }

  function getCardIdFromURL() {
    return new URLSearchParams(window.location.search).get('card_id') || '';
  }

  function getFromParam() {
    return new URLSearchParams(window.location.search).get('from') || 'marketplace';
  }

  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-msg').textContent = msg || 'This item could not be loaded.';
    document.getElementById('error-screen').classList.add('visible');
  }

  function hideLoading() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('page').classList.add('visible');
  }

  // ── AUTH GUARD ──
  onAuthStateChanged(auth, async user => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    const cardId = getCardIdFromURL();
    if (!cardId) {
      showError('No item ID provided.');
      return;
    }

    // Load user XP and marketplace data in parallel
    const [userXP] = await Promise.all([
      loadUserXP(user),
      loadAndRender(cardId, user)
    ]);
  });

  // ── LOAD USER XP ──
  async function loadUserXP(user) {
    try {
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists()) return 0;
      const cards = userSnap.data().cards || [];
      if (cards.length === 0) return 0;

      const fetches = cards.map(async c => {
        const cardId = typeof c === 'string' ? c : c.cardId;
        try {
          const res = await jsonpFetch(
            LIVING_API + '?action=get_card&card_id=' + encodeURIComponent(cardId), 8000
          );
          if (res && res.success && res.card) return parseInt(res.card['Current XP']) || 0;
        } catch(e) {}
        return 0;
      });

      const total = (await Promise.all(fetches)).reduce((s, x) => s + x, 0);
      document.getElementById('header-xp').textContent = fmt(total) + ' XP';
      return total;
    } catch(err) {
      return 0;
    }
  }

  // ── LOAD MARKETPLACE AND RENDER ──
  async function loadAndRender(cardId, user) {
    try {
      const data = await jsonpFetch(LIVING_API + '?action=get_marketplace', 12000);

      if (!data || !data.success || !data.cards) {
        showError('Could not load marketplace data. Please try again.');
        return;
      }

      const card = data.cards.find(c => String(c.cardId) === String(cardId));

      if (!card) {
        showError('Item not found in the marketplace.');
        return;
      }

      // Get current XP from header (may still be loading, so we re-fetch)
      let userXP = 0;
      try {
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        if (userSnap.exists()) {
          const registeredCards = userSnap.data().cards || [];
          const fetches = registeredCards.map(async c => {
            const cardId = typeof c === 'string' ? c : c.cardId;
            try {
              const res = await jsonpFetch(
                LIVING_API + '?action=get_card&card_id=' + encodeURIComponent(cardId), 8000
              );
              if (res && res.success && res.card) return parseInt(res.card['Current XP']) || 0;
            } catch(e) {}
            return 0;
          });
          userXP = (await Promise.all(fetches)).reduce((s, x) => s + x, 0);
        }
      } catch(e) {}

      render(card, userXP);

    } catch(err) {
      showError('Connection error — please refresh and try again.');
    }
  }

  // ── RENDER ──
  function render(card, userXP) {
    const remaining  = parseInt(card.remaining)   || 0;
    const edition    = parseInt(card.editionSize) || 0;
    const xpPrice    = parseInt(card.xpPrice)     || 0;
    const soldOut    = remaining <= 0;
    const canAfford  = userXP >= xpPrice;
    const availPct   = edition > 0 ? Math.round((remaining / edition) * 100) : 0;
    const format     = (card.format || 'Card').toLowerCase();
    const label      = card.format || 'Card';
    const imageShape = format === 'card' ? 'poker' : 'square';

    // Back link
    const from = getFromParam();
    document.getElementById('back-link').href = from === 'spotlight' ? 'spotlight.html' : 'marketplace.html';
    document.getElementById('back-link').textContent = from === 'spotlight'
      ? '← Back to Spotlight'
      : '← Back to Marketplace';

    // Image shape
    document.getElementById('item-image').classList.add(imageShape);

    // Type badge
    document.getElementById('type-badge').textContent  = label;
    document.getElementById('item-eyebrow').textContent = label;

    // Sold out overlay
    if (soldOut) {
      document.getElementById('sold-out-overlay').classList.add('visible');
    }

    // Image
    if (card.imageUrl) {
      const imageEl = document.getElementById('item-image');
      const img = document.createElement('img');
      img.src = card.imageUrl;
      img.alt = card.cardName || '';
      img.onerror = () => img.remove();
      imageEl.appendChild(img);
    }

    // Title
    document.getElementById('item-title').textContent = card.cardName || '—';

    // Meta strip
    document.getElementById('editions-issued').textContent   = fmt(edition);
    document.getElementById('editions-remaining').textContent = fmt(remaining);

    if (card.dateAdded) {
      const d = new Date(card.dateAdded);
      document.getElementById('date-issued').textContent = isNaN(d)
        ? String(card.dateAdded)
        : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Availability bar
    document.getElementById('avail-text').textContent = remaining + ' of ' + edition + ' remaining';
    setTimeout(() => {
      document.getElementById('avail-fill').style.width = availPct + '%';
    }, 400);

    // Description
    document.getElementById('item-description').textContent = card.description || '—';

    // XP cost
    document.getElementById('redeem-cost').textContent = fmt(xpPrice) + ' XP';

    // Afford indicator
    const affordEl = document.getElementById('afford-row');
    if (soldOut) {
      affordEl.textContent = '';
    } else if (canAfford) {
      affordEl.textContent = '✓ You can afford this';
      affordEl.className   = 'afford-row can';
    } else {
      const needed = xpPrice - userXP;
      affordEl.textContent = fmt(needed) + ' more XP needed';
      affordEl.className   = 'afford-row cannot';
    }

    // Redeem button
    const btn = document.getElementById('btn-redeem');
    if (soldOut) {
      btn.textContent = 'Sold Out';
      btn.classList.add('disabled');
    } else if (!canAfford) {
      btn.textContent = 'Insufficient XP';
      btn.classList.add('disabled');
    } else {
      const params = new URLSearchParams({ card_id: card.cardId, from: getFromParam() });
      btn.href = 'confirmation.html?' + params.toString();
      btn.textContent = 'Redeem This Item';
    }

    // Header XP (update now that we have it)
    document.getElementById('header-xp').textContent = fmt(userXP) + ' XP';

    hideLoading();
  }
</script>

</body>
</html>
