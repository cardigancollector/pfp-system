<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Marketplace — Browse</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #111318;
    --bg2:       #181b22;
    --bg3:       #1e2229;
    --text:      #e8e4dc;
    --muted:     #a8a9ad;
    --gold:      #c9a84c;
    --gold-dim:  #7a6530;
    --gold-lite: #e8c97a;
    --green:     #2ecc71;
    --red:       #e74c3c;
    --border:    rgba(201,168,76,0.18);
    --border-h:  rgba(201,168,76,0.55);
    --glass:     rgba(17,19,24,0.82);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Crimson Pro', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-fixed {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 50%),
      radial-gradient(ellipse 60% 80% at 0% 100%, rgba(201,168,76,0.04) 0%, transparent 50%),
      #0f1116;
  }
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 100%);
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,22,0.96);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    padding: 0 48px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    text-decoration: none;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .nav-xp {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border);
    padding: 7px 16px;
  }
  .nav-xp-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .nav-xp-value {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    font-weight: 700;
    min-width: 60px;
    text-align: right;
  }
  .nav-link {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
    background: none;
    border: none;
  }
  .nav-link:hover { color: var(--gold); }
  .nav-link.active { color: var(--gold); }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 2px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 60px 48px 100px;
    display: none;
  }
  main.visible { display: block; }

  /* ── PAGE HEADER ── */
  .page-eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
    animation: riseIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  .eyebrow-line {
    width: 40px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }
  .eyebrow-text {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .page-headline {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
    animation: riseIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.08s both;
  }
  .page-headline span { color: var(--gold); }
  .page-subtitle {
    font-size: 1.05rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 52px;
    animation: riseIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.15s both;
  }

  @keyframes riseIn {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    animation: riseIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }
  .filter-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(201,168,76,0.35); }
  .filter-btn.active {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
  }
  .filter-count {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  /* ── CARD ITEM ── */
  .card-item {
    background: var(--glass);
    border: 1px solid var(--border);
    border-top: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    animation: riseIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    overflow: hidden;
  }
  .card-item:hover {
    border-top-color: var(--gold);
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(201,168,76,0.08);
  }
  .card-item.sold-out {
    opacity: 0.55;
  }
  .card-item.sold-out:hover {
    transform: none;
  }

  /* Spotlight badge */
  .spotlight-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 2;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--gold);
    padding: 4px 10px;
  }

  /* Sold out overlay */
  .sold-out-tag {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 2;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(17,19,24,0.9);
    border: 1px solid rgba(168,169,173,0.3);
    padding: 4px 10px;
    display: none;
  }
  .card-item.sold-out .sold-out-tag { display: block; }

  /* Image */
  .card-img-wrap {
    background: #0a0c10;
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .card-img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    display: block;
  }
  .card-item:hover .card-img { transform: scale(1.04); }
  .card-img-placeholder {
    width: 60px; height: 60px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-dim);
    font-size: 1.4rem;
  }

  /* Info */
  .card-info {
    padding: 18px 20px 20px;
    border-top: 1px solid var(--border);
  }
  .card-format {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-xp {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .card-xp-num {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
  }
  .card-xp-label {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
  .card-remaining {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
  }
  .card-remaining.low { color: #e8a84c; }
  .card-remaining.very-low { color: var(--red); }

  /* Availability bar */
  .card-avail-track {
    height: 2px;
    background: rgba(201,168,76,0.12);
    margin-top: 12px;
    overflow: hidden;
  }
  .card-avail-fill {
    height: 100%;
    background: var(--gold);
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
    width: 0%;
  }

  /* ── EMPTY / ERROR ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state-icon {
    font-size: 2rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .empty-state-text {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    nav { padding: 0 24px; }
    main { padding: 48px 24px 80px; }
    .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
  }
  @media (max-width: 700px) {
    nav { padding: 0 16px; }
    .nav-xp-label { display: none; }
    main { padding: 36px 16px 60px; }
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .filter-bar { gap: 8px; }
    .filter-count { display: none; }
  }
</style>
</head>
<body>

<div class="bg-fixed"></div>
<div class="bg-grid"></div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading Marketplace…</div>
</div>

<!-- Nav -->
<nav>
  <a class="nav-logo" href="spotlight.html">XP</a>
  <div class="nav-right">
    <div class="nav-xp">
      <span class="nav-xp-label">XP</span>
      <span class="nav-xp-value" id="nav-xp">—</span>
    </div>
    <a class="nav-link" href="spotlight.html">Spotlight</a>
    <a class="nav-link active" href="marketplace.html">Marketplace</a>
    <a class="nav-link" href="living-cards.html">My Cards</a>
    <button class="nav-link" onclick="doSignOut()">Sign Out</button>
  </div>
</nav>

<!-- Main -->
<main id="main">

  <div class="page-eyebrow">
    <div class="eyebrow-line"></div>
    <div class="eyebrow-text">XP Marketplace</div>
    <div class="eyebrow-line"></div>
  </div>
  <h1 class="page-headline">Browse <span>All Offerings</span></h1>
  <p class="page-subtitle">Redeem your XP for exclusive cards, prints, originals, and more.</p>

  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Card', this)">Cards</button>
    <button class="filter-btn" onclick="setFilter('Print', this)">Prints</button>
    <button class="filter-btn" onclick="setFilter('Original', this)">Originals</button>
    <button class="filter-btn" onclick="setFilter('Jersey', this)">Jerseys</button>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div class="cards-grid" id="cards-grid">
    <!-- populated by JS -->
  </div>

</main>

<!-- Firebase -->
<script type="module">
  import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyCnZez3HLcarYUo8mAYyj9p7K6zbqwE_KU",
    authDomain:        "pfp-system.firebaseapp.com",
    projectId:         "pfp-system",
    storageBucket:     "pfp-system.appspot.com",
    messagingSenderId: "643360345707",
    appId:             "1:643360345707:web:9e5b9a902b41169ae5eb2e"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const LIVING_API = 'https://script.google.com/macros/s/AKfycbwtgR6eiGfCtBSij8OhbxNyaQ5CPI0KpbuAZ9Rmw2SXHj-0EmRU20PVGpq5SRPX3OMy/exec';

  let currentUser  = null;
  let userXP       = 0;
  let allCards     = [];
  let activeFilter = 'all';

  // ── JSONP ──
  function jsonpFetch(url, timeout) {
    return new Promise((resolve, reject) => {
      const cb     = 'pfp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 9999);
      const script = document.createElement('script');
      const timer  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeout || 10000);
      function cleanup() {
        clearTimeout(timer);
        delete window[cb];
        if (document.body.contains(script)) document.body.removeChild(script);
      }
      window[cb]     = data => { cleanup(); resolve(data); };
      script.onerror = ()   => { cleanup(); reject(new Error('script error')); };
      script.src     = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb + '&_=' + Date.now();
      document.body.appendChild(script);
    });
  }

  // ── AUTH GUARD ──
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    await Promise.all([loadUserXP(user), loadMarketplace()]);
    hideLoading();
  });

  // ── LOAD USER XP ──
  async function loadUserXP(user) {
    try {
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists()) return;
      const cards = userSnap.data().cards || [];
      if (cards.length === 0) { updateXP(0); return; }

      const fetches = cards.map(async c => {
        try {
          const res = await jsonpFetch(LIVING_API + '?action=get_card&card_id=' + encodeURIComponent(c.cardId || c), 8000);
          if (res && res.success && res.card) return parseInt(res.card['Current XP']) || 0;
        } catch(e) {}
        return 0;
      });
      const total = (await Promise.all(fetches)).reduce((s, x) => s + x, 0);
      updateXP(total);
    } catch(err) {
      updateXP(0);
    }
  }

  function updateXP(xp) {
    userXP = xp;
    document.getElementById('nav-xp').textContent = xp.toLocaleString();
  }

  // ── LOAD MARKETPLACE ──
  async function loadMarketplace() {
    try {
      const data = await jsonpFetch(LIVING_API + '?action=get_marketplace', 12000);
      if (!data || !data.success || !data.cards) {
        showEmpty('Unable to load marketplace. Please try again.');
        return;
      }
      allCards = data.cards;
      renderGrid(allCards);
    } catch(err) {
      showEmpty('Connection error — please refresh.');
    }
  }

  // ── RENDER GRID ──
  function renderGrid(cards) {
    const grid = document.getElementById('cards-grid');

    if (!cards || cards.length === 0) {
      showEmpty('No offerings available right now.');
      return;
    }

    grid.innerHTML = cards.map((card, i) => {
      const remaining = parseInt(card.remaining)   || 0;
      const edition   = parseInt(card.editionSize) || 0;
      const xpPrice   = parseInt(card.xpPrice)     || 0;
      const soldOut   = remaining <= 0;
      const availPct  = edition > 0 ? Math.round((remaining / edition) * 100) : 0;
      const isSpot    = (card.status || '').toLowerCase() === 'spotlight';

      let remClass = '';
      if (!soldOut) {
        const pct = availPct;
        if (pct <= 10) remClass = 'very-low';
        else if (pct <= 25) remClass = 'low';
      }

      const imgHtml = card.imageUrl
        ? `<img class="card-img" src="${esc(card.imageUrl)}" alt="${esc(card.cardName)}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="card-img-placeholder">✦</div>`;

      return `
        <div class="card-item${soldOut ? ' sold-out' : ''}"
             style="animation-delay:${i * 0.06}s"
             onclick="goToDetail('${esc(card.cardId)}')">
          ${isSpot ? '<div class="spotlight-badge">Spotlight</div>' : ''}
          <div class="sold-out-tag">Sold Out</div>
          <div class="card-img-wrap">${imgHtml}</div>
          <div class="card-info">
            <div class="card-format">${esc(card.format || 'Card')}</div>
            <div class="card-name">${esc(card.cardName || card.cardId)}</div>
            <div class="card-meta">
              <div class="card-xp">
                <span class="card-xp-num">${xpPrice.toLocaleString()}</span>
                <span class="card-xp-label">XP</span>
              </div>
              <div class="card-remaining ${remClass}">
                ${soldOut ? 'Sold Out' : remaining.toLocaleString() + ' left'}
              </div>
            </div>
            <div class="card-avail-track">
              <div class="card-avail-fill" data-pct="${availPct}"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Animate availability bars after render
    requestAnimationFrame(() => {
      document.querySelectorAll('.card-avail-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });

    updateCount(cards.length);
  }

  function updateCount(n) {
    document.getElementById('filter-count').textContent = n + (n === 1 ? ' offering' : ' offerings');
  }

  function showEmpty(msg) {
    document.getElementById('cards-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">✦</div>
        <div class="empty-state-text">${msg}</div>
      </div>
    `;
    updateCount(0);
  }

  function hideLoading() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').classList.add('visible');
  }

  // ── FILTER ──
  window.setFilter = function(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filtered = type === 'all'
      ? allCards
      : allCards.filter(c => (c.format || '').toLowerCase() === type.toLowerCase());
    renderGrid(filtered);
  };

  // ── NAVIGATE ──
  window.goToDetail = function(cardId) {
    const params = new URLSearchParams({ card_id: cardId, from: 'marketplace' });
    window.location.href = 'item-detail.html?' + params.toString();
  };

  // ── SIGN OUT ──
  window.doSignOut = async function() {
    await signOut(auth);
    window.location.href = 'login.html';
  };

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
