<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PfP Living Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --dormant-bg: #0d0d0f;
      --dormant-accent: #3a3a4a;
      --dormant-glow: #1a1a2e;
      --awakened-bg: #0a0f1a;
      --awakened-accent: #b87333;
      --awakened-glow: #b8733333;
      --growing-bg: #0a1a0f;
      --growing-accent: #7ab648;
      --growing-glow: #7ab64833;
      --established-bg: #0f0f1a;
      --established-accent: #8888cc;
      --established-glow: #8888cc33;
      --renowned-bg: #1a0f00;
      --renowned-accent: #ffd700;
      --renowned-glow: #ffd70044;
      --legendary-bg: #1a0a1a;
      --legendary-accent: #df80ff;
      --legendary-glow: #df80ff55;
      --mythic-bg: #050510;
      --mythic-accent: #ffffff;
      --mythic-glow: #ffffff66;

      --copper-badge: #b87333;
      --nickel-badge: #a8a9ad;
      --silver-badge: #c0c0c0;
      --gold-badge: #ffd700;
      --diamond-badge: #b9f2ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Crimson Pro', Georgia, serif;
      background: #050508;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .card-container {
      position: relative;
      z-index: 1;
      width: min(420px, 94vw);
      padding: 20px 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .card-frame {
      width: 100%;
      border-radius: 18px;
      padding: 3px;
      position: relative;
      transition: all 1.2s ease;
    }

    .card-frame::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      background: var(--frame-gradient, conic-gradient(from 0deg, #3a3a4a, #1a1a2e, #3a3a4a));
      z-index: -1;
      animation: rotateGradient 6s linear infinite;
      opacity: var(--frame-opacity, 0.4);
    }

    @keyframes rotateGradient {
      to { filter: hue-rotate(360deg); }
    }

    .card-inner {
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg, #0d0d0f);
      position: relative;
    }

    .card-top {
      padding: 18px 22px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
    }

    .card-id {
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent, #3a3a4a);
      opacity: 0.7;
    }

    .grade-badge {
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--grade-color, #3a3a4a);
      color: var(--grade-color, #3a3a4a);
      text-transform: uppercase;
    }

    .card-visual {
      width: 100%;
      height: 280px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #card-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .stage-label {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .stage-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 900;
      color: var(--accent, #3a3a4a);
      text-shadow: 0 0 40px var(--glow, transparent), 0 0 80px var(--glow, transparent);
      letter-spacing: 4px;
      animation: pulseText 3s ease-in-out infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    .stage-level {
      font-family: 'Crimson Pro', serif;
      font-size: 12px;
      letter-spacing: 5px;
      color: var(--accent, #3a3a4a);
      opacity: 0.5;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .card-stats {
      padding: 16px 22px;
      border-top: 1px solid var(--accent-dim, #1a1a2e);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
    }

    .stat { text-align: center; }

    .stat-value {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      color: var(--accent, #3a3a4a);
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent, #3a3a4a);
      opacity: 0.45;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .xp-section { padding: 4px 22px 18px; }

    .xp-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .xp-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent, #3a3a4a);
      opacity: 0.5;
    }

    .xp-value {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      color: var(--accent, #3a3a4a);
    }

    .xp-track {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .xp-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent, #3a3a4a);
      box-shadow: 0 0 8px var(--glow, transparent);
      transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .owner-strip {
      padding: 14px 22px;
      border-top: 1px solid var(--accent-dim, #1a1a2e);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .owner-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent, #3a3a4a);
      opacity: 0.4;
    }

    .owner-id {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      color: var(--accent, #3a3a4a);
      opacity: 0.8;
    }

    .last-seen {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      text-align: center;
    }

    .decay-warning {
      margin-top: 10px;
      padding: 10px 18px;
      border: 1px solid #ff444444;
      border-radius: 8px;
      background: #ff000011;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff6666;
      text-align: center;
      display: none;
    }

    /* scan toast */
    .scan-toast {
      margin-top: 14px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      display: none;
    }
    .scan-toast.success {
      border: 1px solid #44ff8844;
      background: #00ff4411;
      color: #66ff99;
    }
    .scan-toast.already {
      border: 1px solid #ffaa0044;
      background: #ffaa0011;
      color: #ffcc66;
    }

    .state-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050508;
      z-index: 100;
      gap: 16px;
      transition: opacity 0.6s ease;
    }

    .state-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-ring {
      width: 48px;
      height: 48px;
      border: 2px solid #1a1a2e;
      border-top-color: #8888cc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: #3a3a5a;
      text-transform: uppercase;
    }

    .error-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      letter-spacing: 3px;
      color: #ff4444;
      text-align: center;
      padding: 0 20px;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="state-screen" id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Awakening Card</div>
</div>

<div class="state-screen hidden" id="error-screen">
  <div class="error-text" id="error-msg">Card not found.</div>
</div>

<div class="card-container" id="card-container" style="opacity:0; transition: opacity 0.8s ease;">

  <div class="card-frame" id="card-frame">
    <div class="card-inner">

      <div class="card-top">
        <div class="card-id" id="card-id-label">—</div>
        <div class="grade-badge" id="grade-badge">—</div>
      </div>

      <div class="card-visual">
        <canvas id="card-canvas"></canvas>
        <div class="stage-label">
          <div class="stage-name" id="stage-name">—</div>
          <div class="stage-level" id="stage-level">—</div>
        </div>
      </div>

      <div class="card-stats">
        <div class="stat">
          <div class="stat-value" id="stat-xp">—</div>
          <div class="stat-label">Total XP</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-streak">—</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-interactions">—</div>
          <div class="stat-label">Interactions</div>
        </div>
      </div>

      <div class="xp-section">
        <div class="xp-header">
          <span class="xp-label">Progress to next stage</span>
          <span class="xp-value" id="xp-next-label">—</span>
        </div>
        <div class="xp-track">
          <div class="xp-fill" id="xp-fill"></div>
        </div>
      </div>

      <div class="owner-strip">
        <span class="owner-label">Owner</span>
        <span class="owner-id" id="owner-id">—</span>
      </div>

    </div>
  </div>

  <div class="last-seen" id="last-seen"></div>
  <div class="decay-warning" id="decay-warning">⚠ This card is decaying</div>
  <div class="scan-toast" id="scan-toast"></div>

</div>

<script>
const STAGES = [
  { name: 'DORMANT',     level: 1,  minXP: 0,    nextXP: 100  },
  { name: 'AWAKENED',    level: 2,  minXP: 100,  nextXP: 250  },
  { name: 'GROWING',     level: 3,  minXP: 250,  nextXP: 500  },
  { name: 'ESTABLISHED', level: 5,  minXP: 500,  nextXP: 1000 },
  { name: 'RENOWNED',    level: 10, minXP: 1000, nextXP: 2500 },
  { name: 'LEGENDARY',   level: 20, minXP: 2500, nextXP: 5000 },
  { name: 'MYTHIC',      level: 47, minXP: 5000, nextXP: null },
];

const GRADE_COLORS = {
  copper:  '#b87333',
  nickel:  '#a8a9ad',
  silver:  '#c0c0c0',
  gold:    '#ffd700',
  diamond: '#b9f2ff',
};

const STAGE_THEMES = {
  DORMANT:     { bg: '#0d0d0f', accent: '#3a3a4a', glow: 'transparent',  frameOp: 0.2 },
  AWAKENED:    { bg: '#0a0f1a', accent: '#b87333', glow: '#b8733355',    frameOp: 0.5 },
  GROWING:     { bg: '#0a1a0f', accent: '#7ab648', glow: '#7ab64855',    frameOp: 0.6 },
  ESTABLISHED: { bg: '#0f0f1a', accent: '#8888cc', glow: '#8888cc66',    frameOp: 0.7 },
  RENOWNED:    { bg: '#1a0f00', accent: '#ffd700', glow: '#ffd70066',    frameOp: 0.8 },
  LEGENDARY:   { bg: '#1a0a1a', accent: '#df80ff', glow: '#df80ff88',    frameOp: 0.9 },
  MYTHIC:      { bg: '#050510', accent: '#ffffff', glow: '#ffffff99',    frameOp: 1.0 },
};

const API = 'https://script.google.com/macros/s/AKfycbwtgR6eiGfCtBSij8OhbxNyaQ5CPI0KpbuAZ9Rmw2SXHj-0EmRU20PVGpq5SRPX3OMy/exec';

function getStageForXP(xp) {
  let stage = STAGES[0];
  for (const s of STAGES) { if (xp >= s.minXP) stage = s; }
  return stage;
}

function xpProgress(xp, stage) {
  if (!stage.nextXP) return 1;
  return Math.min(1, (xp - stage.minXP) / (stage.nextXP - stage.minXP));
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return 'Last seen moments ago';
  if (diff < 3600) return `Last seen ${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `Last seen ${Math.floor(diff/3600)}h ago`;
  return `Last seen ${Math.floor(diff/86400)}d ago`;
}

function applyTheme(stageName, grade) {
  const t = STAGE_THEMES[stageName] || STAGE_THEMES.DORMANT;
  const gc = GRADE_COLORS[grade?.toLowerCase()] || '#3a3a4a';

  document.body.style.background = t.bg;
  const frame = document.getElementById('card-frame');
  frame.style.setProperty('--frame-gradient',
    `conic-gradient(from 0deg, ${t.accent}, ${t.bg}, ${t.accent}, ${t.bg}, ${t.accent})`);
  frame.style.setProperty('--frame-opacity', t.frameOp);

  const inner = frame.querySelector('.card-inner');
  inner.style.background = t.bg;
  inner.style.setProperty('--accent', t.accent);
  inner.style.setProperty('--glow', t.glow);
  inner.style.setProperty('--accent-dim', t.bg);

  const els = ['card-id-label','stage-name','stage-level','stat-xp','stat-streak',
                'stat-interactions','xp-next-label','owner-id','xp-fill'];
  els.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.color = t.accent; }
  });

  document.getElementById('xp-fill').style.background = t.accent;
  document.getElementById('xp-fill').style.boxShadow = `0 0 8px ${t.glow}`;

  document.querySelectorAll('.stat-label, .owner-label, .xp-label').forEach(el => {
    el.style.color = t.accent;
  });
  document.querySelectorAll('.xp-track').forEach(el => {
    el.style.background = 'rgba(255,255,255,0.07)';
  });
  document.querySelectorAll('.card-stats, .owner-strip').forEach(el => {
    el.style.borderColor = t.accent + '22';
  });

  const badge = document.getElementById('grade-badge');
  badge.style.borderColor = gc;
  badge.style.color = gc;
}

function initBgCanvas(theme) {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const accent = theme.accent;
  const particles = Array.from({length: 60}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.3 + 0.05,
    opacity: Math.random() * 0.4 + 0.05,
  }));

  function hex2rgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }

  const rgb = hex2rgb(accent.length === 7 ? accent : '#3a3a4a');

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y -= p.speed;
      if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb}, ${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

function drawCardVisual(stageName, xp) {
  const canvas = document.getElementById('card-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const t = STAGE_THEMES[stageName] || STAGE_THEMES.DORMANT;

  ctx.clearRect(0, 0, W, H);

  if (stageName !== 'DORMANT') {
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.7);
    grad.addColorStop(0, t.glow);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  const rings = { DORMANT:0, AWAKENED:1, GROWING:1, ESTABLISHED:2, RENOWNED:2, LEGENDARY:3, MYTHIC:4 };
  const ringCount = rings[stageName] || 0;
  const now = Date.now() / 1000;

  for (let i = 0; i < ringCount; i++) {
    const angle = now * (0.3 + i * 0.15) + (i * Math.PI * 0.6);
    const rx = W * (0.28 + i * 0.06);
    const ry = H * (0.18 + i * 0.04);
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = t.accent + (i === 0 ? '55' : '33');
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  if (stageName === 'MYTHIC') {
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + now * 0.1;
      const len = W * 0.45;
      ctx.beginPath();
      ctx.moveTo(W/2, H/2);
      ctx.lineTo(W/2 + Math.cos(angle) * len, H/2 + Math.sin(angle) * len);
      ctx.strokeStyle = `rgba(255,255,255,${0.03 + 0.02 * Math.sin(now + i)})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  requestAnimationFrame(() => drawCardVisual(stageName, xp));
}

// ── Auto-scan on load ──────────────────────────────────────
async function fireQRScan(cardId, ownerToken) {
  const toast = document.getElementById('scan-toast');
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'qr_scan',
        cardId: cardId,
        ownerToken: ownerToken
      })
    });
    const data = await res.json();
    if (data.success) {
      toast.textContent = '✦ +10 XP awarded — scan logged';
      toast.className = 'scan-toast success';
      toast.style.display = 'block';
    } else {
      // Already scanned today or other soft error — show quietly
      toast.textContent = 'Scan recorded';
      toast.className = 'scan-toast already';
      toast.style.display = 'block';
    }
  } catch(e) {
    // Fail silently — card still displays
  }
}

// ── Fetch & render ─────────────────────────────────────────
async function loadCard() {
  const params     = new URLSearchParams(window.location.search);
  const cardId     = params.get('id') || params.get('card_id');
  const ownerToken = params.get('owner_token') || params.get('ownerToken');

  if (!cardId) return showError('No card ID specified.');

  try {
    const res  = await fetch(`${API}?action=get_card&card_id=${encodeURIComponent(cardId)}`);
    const data = await res.json();

    if (!data.success) return showError(data.error || 'Card not found.');

    renderCard(data);

    // Fire scan XP only if owner token is present in URL
    if (ownerToken) {
      fireQRScan(cardId, ownerToken);
    }

  } catch (e) {
    showError('Could not reach the card server.');
  }
}

function renderCard(data) {
  const xp        = data.totalXP || 0;
  const stage     = getStageForXP(xp);
  const theme     = STAGE_THEMES[stage.name] || STAGE_THEMES.DORMANT;
  const grade     = data.grade || 'copper';
  const daysSince = data.daysSinceInteraction || 0;

  applyTheme(stage.name, grade);
  initBgCanvas(theme);
  drawCardVisual(stage.name, xp);

  document.getElementById('card-id-label').textContent     = data.cardId;
  document.getElementById('grade-badge').textContent       = grade.toUpperCase();
  document.getElementById('stage-name').textContent        = stage.name;
  document.getElementById('stage-level').textContent       = `Level ${stage.level}`;
  document.getElementById('stat-xp').textContent           = xp.toLocaleString();
  document.getElementById('stat-streak').textContent       = data.streak || 0;
  document.getElementById('stat-interactions').textContent = data.totalInteractions || 0;
  document.getElementById('owner-id').textContent          = data.ownerId || '—';
  document.getElementById('last-seen').textContent         = timeAgo(data.lastInteraction);

  const progress  = xpProgress(xp, stage);
  const nextLabel = stage.nextXP ? `${xp} / ${stage.nextXP} XP` : 'MAX';
  document.getElementById('xp-next-label').textContent = nextLabel;
  setTimeout(() => {
    document.getElementById('xp-fill').style.width = (progress * 100) + '%';
  }, 300);

  if (daysSince >= 1) {
    const w = document.getElementById('decay-warning');
    w.style.display = 'block';
    if (daysSince >= 7) w.textContent = '⚠ Severe decay — stage at risk';
    else if (daysSince >= 3) w.textContent = '⚠ This card is decaying rapidly';
  }

  document.getElementById('loading-screen').classList.add('hidden');
  const container = document.getElementById('card-container');
  container.style.opacity = '1';
}

function showError(msg) {
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-screen').classList.remove('hidden');
}

loadCard();
</script>
</body>
</html>
